llm_policy:
  approved_models:
  - deepseek-chat
  - openrouter/openai/gpt-5-mini
  force_primary_for_all_roles: false
model_mapping:
  dirigent: deepseek-chat
  coding: deepseek-chat
  research: deepseek-chat
  analysis: deepseek-chat
  system: deepseek-chat
  creative: deepseek-chat
orchestrator:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  temperature: 0.1
  max_tokens: 2048
workers:
  max_workers: 15
  presets:
    coder:
      capabilities:
      - terminal
      - file_ops
      model: deepseek-chat
      task_type: coding
      description: Specialized in programming and code analysis
    researcher:
      capabilities:
      - web_ops
      - browser_ops
      - file_ops
      model: deepseek-chat
      task_type: research
      description: Specialized in web research, browsing, and data gathering
    browser_researcher:
      capabilities:
      - browser_ops
      - web_ops
      - file_ops
      model: deepseek-chat
      task_type: research
      description: Specialized in dynamic websites, login flows, and browser-driven
        research
    analyzer:
      capabilities:
      - file_ops
      model: deepseek-chat
      task_type: analysis
      description: Specialized in data analysis and processing
    admin:
      capabilities:
      - terminal
      - file_ops
      model: deepseek-chat
      task_type: system
      description: Specialized in system administration
    developer:
      capabilities:
      - terminal
      - file_ops
      - dev_tools
      - web_ops
      model: deepseek-chat
      task_type: coding
      description: Specialized in software development with code execution, testing, and dependency management
  default_model: deepseek-chat
providers:
  openai:
    api_key_env: OPENAI_API_KEY
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
  google:
    api_key_env: GEMINI_API_KEY
  gemini:
    api_key_env: GEMINI_API_KEY
  mistral:
    api_key_env: MISTRAL_API_KEY
  cohere:
    api_key_env: COHERE_API_KEY
  groq:
    api_key_env: GROQ_API_KEY
  openrouter:
    api_key_env: OPENROUTER_API_KEY
  xai:
    api_key_env: XAI_API_KEY
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
security:
  command_blacklist:
  - rm -rf /
  - rm -rf /*
  - rm -rf .
  - rm -rf *
  - 'format c:'
  - del /f /s /q
  - shutdown
  - reboot
  require_confirmation: false
  sandbox_mode: false
ui:
  hide_worker_creation: true
  show_technical_details: false
  language: en
